<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Inventario - R7 Colmado</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f7;
    margin:20px;
}

h1{
    text-align:center;
}

.container{
    width:80%;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
}

input, button{
    padding:10px;
    margin:5px;
}

button{
    background:#27ae60;
    color:white;
    border:none;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th, td{
    border:1px solid gray;
    padding:10px;
    text-align:center;
}

th{
    background:#27ae60;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h1>📦 Inventario R7</h1>

<input type="text" id="producto" placeholder="Nombre del producto">
<input type="number" id="precio" placeholder="Precio">
<input type="number" id="cantidad" placeholder="Cantidad">

<button onclick="agregarProducto()">Agregar</button>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaProductos"></tbody>
</table>

</div>

<script>

let productos = JSON.parse(localStorage.getItem("productos")) || [];

function guardar(){
    localStorage.setItem("productos", JSON.stringify(productos));
}

function agregarProducto(){

    let nombre = document.getElementById("producto").value;
    let precio = document.getElementById("precio").value;
    let cantidad = document.getElementById("cantidad").value;

    if(nombre === "" || precio === "" || cantidad === ""){
        alert("Complete todos los campos");
        return;
    }

    productos.push({nombre, precio, cantidad});
    guardar();
    mostrar();

    document.getElementById("producto").value="";
    document.getElementById("precio").value="";
    document.getElementById("cantidad").value="";
}

function eliminarProducto(i){
    productos.splice(i,1);
    guardar();
    mostrar();
}

function mostrar(){

    let tabla = document.getElementById("tablaProductos");
    tabla.innerHTML="";

    productos.forEach((p,i)=>{
        tabla.innerHTML += `
        <tr>
        <td>${p.nombre}</td>
        <td>${p.precio}</td>
        <td>${p.cantidad}</td>
        <td><button onclick="eliminarProducto(${i})">Eliminar</button></td>
        </tr>
        `;
    });
}

mostrar();

</script>

</body>
</html>
