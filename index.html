<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Vision & 3D Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #canvas-container {
            width: 100%;
            height: 300px;
            border-radius: 1rem;
            overflow: hidden;
            background: radial-gradient(circle, #2c3e50, #000000);
            display: none;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-md mb-6 text-center">
        <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            Escáner IA 3D
        </h1>
        <p class="text-gray-400 text-sm mt-2">Apunta, identifica y visualiza en 3D</p>
    </header>

    <main class="w-full max-w-md space-y-4">
        <!-- Cámara / Previsualización -->
        <div class="relative rounded-2xl overflow-hidden bg-black aspect-video border-2 border-blue-500 shadow-lg shadow-blue-500/20">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <canvas id="snapshot" class="hidden"></canvas>
            
            <div id="scan-line" class="absolute top-0 left-0 w-full h-1 bg-blue-400 opacity-50 shadow-[0_0_15px_rgba(59,130,246,0.8)] animate-bounce" style="display:none;"></div>
        </div>

        <!-- Controles -->
        <div class="flex justify-center gap-4">
            <button id="capture-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-full font-bold transition-all transform active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                Identificar Objeto
            </button>
        </div>

        <!-- Resultados -->
        <div id="results-card" class="glass-morphism p-4 rounded-2xl text-gray-800 hidden">
            <h2 class="text-xl font-bold text-blue-900 mb-2">Objeto Detectado</h2>
            <p id="object-description" class="text-sm leading-relaxed mb-4"></p>
            
            <div id="canvas-container"></div>
            <p class="text-xs text-gray-500 mt-2 text-center italic">Modelo 3D generado representativo</p>
        </div>

        <!-- Loading state -->
        <div id="loading" class="hidden flex flex-col items-center gap-2">
            <div class="loader"></div>
            <p class="text-blue-400 font-medium">Procesando imagen con IA...</p>
        </div>
    </main>

    <script>
        const apiKey = ""; // La plataforma inyectará la clave aquí
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('capture-btn');
        const resultsCard = document.getElementById('results-card');
        const objectDescription = document.getElementById('object-description');
        const loading = document.getElementById('loading');
        const canvasContainer = document.getElementById('canvas-container');
        const scanLine = document.getElementById('scan-line');

        let scene, camera, renderer, currentMesh;

        // Inicializar Cámara
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accediendo a la cámara:", err);
                alert("No se pudo acceder a la cámara. Por favor permite los permisos.");
            }
        }

        // Inicializar Three.js para el visor 3D
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, canvasContainer.clientWidth / 300, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(canvasContainer.clientWidth, 300);
            canvasContainer.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5).normalize();
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                if (currentMesh) {
                    currentMesh.rotation.y += 0.01;
                    currentMesh.rotation.x += 0.005;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        // Crear una forma 3D basada en la categoría del objeto
        function update3DModel(description) {
            if (currentMesh) scene.remove(currentMesh);
            
            canvasContainer.style.display = 'block';
            let geometry;
            const desc = description.toLowerCase();

            if (desc.includes('fruta') || desc.includes('bola') || desc.includes('manzana')) {
                geometry = new THREE.SphereGeometry(2, 32, 32);
            } else if (desc.includes('caja') || desc.includes('libro') || desc.includes('celular') || desc.includes('electrónico')) {
                geometry = new THREE.BoxGeometry(3, 2, 1);
            } else if (desc.includes('botella') || desc.includes('vaso')) {
                geometry = new THREE.CylinderGeometry(1, 1, 4, 32);
            } else {
                geometry = new THREE.TorusKnotGeometry(1.5, 0.5, 100, 16);
            }

            const material = new THREE.MeshPhongMaterial({ 
                color: 0x3b82f6, 
                shininess: 100,
                wireframe: true 
            });
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
        }

        // Captura e Identificación con Gemini
        captureBtn.addEventListener('click', async () => {
            const canvas = document.getElementById('snapshot');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

            // UI Feedback
            loading.classList.remove('hidden');
            resultsCard.classList.add('hidden');
            scanLine.style.display = 'block';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Identifica qué objeto es este. Sé breve (máximo 2 frases) y dime su categoría principal (ej: fruta, electrónico, mueble)." },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "No se pudo identificar el objeto.";

                objectDescription.innerText = text;
                loading.classList.add('hidden');
                resultsCard.classList.remove('hidden');
                scanLine.style.display = 'none';

                update3DModel(text);

            } catch (err) {
                console.error(err);
                loading.classList.add('hidden');
                scanLine.style.display = 'none';
                alert("Error al conectar con la IA. Revisa tu conexión.");
            }
        });

        window.onload = () => {
            initCamera();
            init3D();
        };

        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = canvasContainer.clientWidth / 300;
                camera.updateProjectionMatrix();
                renderer.setSize(canvasContainer.clientWidth, 300);
            }
        });
    </script>
</body>
</html>
