<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>R7 Colmado - Login</title>

<style>
body{
    font-family: Arial;
    background:#2c3e50;
}

.login{
    background:white;
    width:300px;
    margin:120px auto;
    padding:20px;
    border-radius:10px;
    text-align:center;
}

input,button{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    background:#27ae60;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="login">
<h2>R7 Colmado</h2>

<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

<p id="msg"></p>
</div>

<script>
function login(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="admin" && p=="1234"){
        window.location="panel.html";
    }else{
        document.getElementById("msg").innerText="Datos incorrectos";
    }
}
</script>

</body>
</html>
