<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Vision & 3D Scanner Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        #canvas-container {
            width: 100%;
            height: 300px;
            border-radius: 1rem;
            overflow: hidden;
            background: #0f172a;
            display: none;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .scan-anim {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #3b82f6;
            box-shadow: 0 0 15px #3b82f6;
            animation: scan 2s ease-in-out infinite;
            display: none;
        }
        @keyframes scan {
            0%, 100% { top: 0%; }
            50% { top: 100%; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center p-4 font-sans">

    <header class="w-full max-w-md mb-8 text-center mt-4">
        <h1 class="text-4xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-br from-blue-400 to-indigo-600">
            VISION 3D AI
        </h1>
        <p class="text-slate-400 text-sm font-medium">Reconocimiento de objetos por IA</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <!-- Cámara Viewport -->
        <div class="relative rounded-3xl overflow-hidden bg-black aspect-square shadow-2xl border border-slate-800">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
            <div id="scan-line" class="scan-anim"></div>
            <canvas id="snapshot" class="hidden"></canvas>
            
            <!-- Overlay visual -->
            <div class="absolute inset-0 border-[20px] border-transparent pointer-events-none flex items-center justify-center">
                <div class="w-48 h-48 border-2 border-white/20 rounded-3xl"></div>
            </div>
        </div>

        <!-- Botón Acción -->
        <div class="flex flex-col items-center gap-4">
            <button id="capture-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-bold text-lg transition-all shadow-lg shadow-blue-900/40 active:scale-95 flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                ESCANEAR AHORA
            </button>
            <p id="status-msg" class="text-slate-500 text-xs italic">Asegúrate de tener buena iluminación</p>
        </div>

        <!-- Resultados -->
        <div id="results-card" class="glass-morphism p-6 rounded-3xl text-slate-900 hidden transition-all">
            <div class="flex items-center gap-2 mb-3">
                <span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold tracking-widest uppercase">Identificado</span>
            </div>
            <h2 id="object-name" class="text-2xl font-extrabold text-slate-900 mb-2 capitalize">---</h2>
            <p id="object-description" class="text-sm text-slate-600 leading-relaxed mb-6"></p>
            
            <div id="canvas-container" class="shadow-inner"></div>
            <p class="text-[10px] text-slate-400 mt-4 text-center font-medium tracking-wide">VISOR DE GEOMETRÍA REPRESENTATIVA</p>
        </div>

        <!-- Loading -->
        <div id="loading" class="hidden flex flex-col items-center gap-4 py-8">
            <div class="loader"></div>
            <p class="text-blue-400 font-bold animate-pulse">CONSULTANDO A GEMINI IA...</p>
        </div>
    </main>

    <script>
        const apiKey = ""; // Inyectada por el entorno
        const video = document.getElementById('video');
        const captureBtn = document.getElementById('capture-btn');
        const resultsCard = document.getElementById('results-card');
        const objectName = document.getElementById('object-name');
        const objectDescription = document.getElementById('object-description');
        const loading = document.getElementById('loading');
        const canvasContainer = document.getElementById('canvas-container');
        const scanLine = document.getElementById('scan-line');
        const statusMsg = document.getElementById('status-msg');

        let scene, camera, renderer, currentMesh;

        // Inicializar Cámara
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1080 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                statusMsg.innerText = "Error: Cámara no disponible";
                console.error(err);
            }
        }

        // Three.js Setup
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, canvasContainer.clientWidth / 300, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(canvasContainer.clientWidth, 300);
            canvasContainer.appendChild(renderer.domElement);

            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);

            const directional = new THREE.DirectionalLight(0x3b82f6, 1);
            directional.position.set(5, 10, 7);
            scene.add(directional);

            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                if (currentMesh) {
                    currentMesh.rotation.y += 0.015;
                    currentMesh.rotation.z += 0.005;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        function create3DGeometry(type) {
            if (currentMesh) scene.remove(currentMesh);
            canvasContainer.style.display = 'block';
            
            let geometry;
            const t = type.toLowerCase();

            if (t.includes('fruta') || t.includes('pelota') || t.includes('redondo')) {
                geometry = new THREE.SphereGeometry(2.5, 32, 32);
            } else if (t.includes('caja') || t.includes('libro') || t.includes('tecnología') || t.includes('móvil')) {
                geometry = new THREE.BoxGeometry(3.5, 2.5, 0.8);
            } else if (t.includes('botella') || t.includes('vaso') || t.includes('lata')) {
                geometry = new THREE.CylinderGeometry(1.2, 1.2, 4, 32);
            } else {
                geometry = new THREE.IcosahedronGeometry(2.5, 1);
            }

            const material = new THREE.MeshPhongMaterial({ 
                color: 0x3b82f6, 
                emissive: 0x1d4ed8,
                shininess: 80,
                wireframe: true 
            });
            currentMesh = new THREE.Mesh(geometry, material);
            scene.add(currentMesh);
        }

        // Función de llamada a la API con Backoff Exponencial (Reintentos)
        async function callGemini(base64Image, retries = 5, delay = 1000) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: "Analiza la imagen y responde únicamente en JSON con este formato: {\"objeto\": \"nombre corto\", \"descripcion\": \"una frase explicativa\", \"tipo_3d\": \"caja o esfera o cilindro o complejo\"}. Sé muy preciso." },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    
                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!resultText) throw new Error("Empty response");
                    
                    return JSON.parse(resultText);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2; // Exponencial
                }
            }
        }

        captureBtn.addEventListener('click', async () => {
            // UI States
            loading.classList.remove('hidden');
            resultsCard.classList.add('hidden');
            scanLine.style.display = 'block';
            statusMsg.innerText = "Capturando imagen...";

            // Capturar Canvas
            const canvas = document.getElementById('snapshot');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            try {
                statusMsg.innerText = "Analizando con IA...";
                const result = await callGemini(base64Image);

                objectName.innerText = result.objeto || "Desconocido";
                objectDescription.innerText = result.descripcion || "No se pudo obtener detalles.";
                create3DGeometry(result.tipo_3d || 'complejo');

                loading.classList.add('hidden');
                resultsCard.classList.remove('hidden');
                scanLine.style.display = 'none';
                statusMsg.innerText = "Escaneo completado con éxito";

            } catch (err) {
                console.error(err);
                loading.classList.add('hidden');
                scanLine.style.display = 'none';
                statusMsg.innerText = "Error: No se pudo identificar. Intenta de nuevo.";
                alert("La IA no pudo procesar la imagen. Asegúrate de que el objeto esté bien centrado y haya luz.");
            }
        });

        window.onload = () => {
            initCamera();
            init3D();
        };
    </script>
</body>
</html>
