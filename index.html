<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Multi-Vía - Consultor Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="glass sticky top-0 z-50 border-b border-slate-200 p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-blue-600 to-indigo-600 p-2 rounded-xl shadow-md">
                <i class="fas fa-microchip text-white text-xl"></i>
            </div>
            <div>
                <h1 class="font-bold text-slate-800 leading-tight">IA Multi-Vía</h1>
                <p class="text-[10px] text-indigo-600 font-semibold uppercase tracking-wider">Conexión Google & IA</p>
            </div>
        </div>
        <button id="clearChat" class="text-slate-400 hover:text-red-500 transition-colors p-2">
            <i class="fas fa-rotate-right"></i>
        </button>
    </header>

    <!-- Chat Area -->
    <main id="chatDisplay" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 max-w-4xl mx-auto w-full chat-container">
        <!-- Mensaje Inicial -->
        <div class="flex justify-start">
            <div class="flex gap-3 max-w-[85%]">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center flex-shrink-0 text-slate-500">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="bg-white border border-slate-200 p-4 rounded-2xl rounded-tl-none shadow-sm text-slate-700 text-sm leading-relaxed">
                    ¡Hola! Soy tu asistente de investigación. Mis respuestas se basan en el modelo <b>Gemini 2.5</b> y consultas en tiempo real a través de <b>Google</b>. ¿Qué "vía" quieres explorar hoy?
                </div>
            </div>
        </div>
    </main>

    <!-- Error Toast -->
    <div id="errorMessage" class="hidden fixed bottom-24 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 text-sm">
        <i class="fas fa-circle-exclamation"></i>
        <span id="errorText">Error de conexión</span>
    </div>

    <!-- Input Footer -->
    <footer class="p-4 bg-white border-t border-slate-200 glass">
        <form id="chatForm" class="max-w-4xl mx-auto flex items-center gap-2">
            <div class="relative flex-1">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Pregunta lo que quieras..." 
                    class="w-full pl-4 pr-12 py-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all outline-none text-slate-800"
                    autocomplete="off"
                >
                <div id="loadingIcon" class="hidden absolute right-4 top-1/2 -translate-y-1/2">
                    <i class="fas fa-circle-notch fa-spin text-indigo-600"></i>
                </div>
            </div>
            <button 
                type="submit" 
                id="sendBtn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-200 transition-all active:scale-95 disabled:opacity-50 disabled:active:scale-100"
            >
                <i class="fas fa-paper-plane text-xl"></i>
            </button>
        </form>
        <p class="text-center text-[10px] text-slate-400 mt-3 uppercase font-medium tracking-widest">
            Powered by Gemini 2.5 Flash & Search Grounding
        </p>
    </footer>

    <script>
        const chatDisplay = document.getElementById('chatDisplay');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const loadingIcon = document.getElementById('loadingIcon');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const clearChatBtn = document.getElementById('clearChat');
        const sendBtn = document.getElementById('sendBtn');

        const apiKey = ""; // El entorno inyecta la clave automáticamente
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ia-multivia-v1';

        // Función para mostrar mensajes
        function addMessage(role, content, sources = []) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            const isUser = role === 'user';
            
            let sourcesHtml = '';
            if (sources.length > 0) {
                sourcesHtml = `
                    <div class="mt-3 flex flex-wrap gap-2 border-t border-slate-100 pt-2">
                        <p class="text-[10px] text-slate-400 w-full flex items-center gap-1 mb-1">
                            <i class="fas fa-globe"></i> Fuentes de Google consultadas:
                        </p>
                        ${sources.map(s => `
                            <a href="${s.uri}" target="_blank" class="text-[10px] bg-slate-50 hover:bg-indigo-50 text-indigo-600 border border-slate-200 px-2 py-1 rounded transition-colors truncate max-w-[150px]">
                                ${s.title || 'Ver enlace'}
                            </a>
                        `).join('')}
                    </div>
                `;
            }

            wrapper.innerHTML = `
                <div class="flex gap-3 max-w-[85%] ${isUser ? 'flex-row-reverse' : ''}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 ${isUser ? 'bg-indigo-600 text-white' : 'bg-slate-200 text-slate-500'}">
                        <i class="fas ${isUser ? 'fa-user' : 'fa-robot'} text-sm"></i>
                    </div>
                    <div class="${isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none'} p-4 rounded-2xl shadow-sm text-sm leading-relaxed">
                        <div class="whitespace-pre-wrap">${content}</div>
                        ${sourcesHtml}
                    </div>
                </div>
            `;
            
            chatDisplay.appendChild(wrapper);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        async function callGemini(prompt, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: {
                            parts: [{ text: "Actúa como un experto investigador. Siempre que se te pregunte algo, utiliza la herramienta de búsqueda para comparar datos y dar 'otras vías' o alternativas de solución. Sé preciso y educado." }]
                        },
                        tools: [{ "google_search": {} }]
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                const groundings = data.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({
                    uri: a.web?.uri,
                    title: a.web?.title
                })) || [];

                return { text, sources: groundings };

            } catch (err) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, backoff));
                    return callGemini(prompt, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            loadingIcon.classList.remove('hidden');
            errorMessage.classList.add('hidden');

            addMessage('user', text);

            try {
                const response = await callGemini(text);
                addMessage('assistant', response.text, response.sources);
            } catch (err) {
                errorText.innerText = "No se pudo conectar con la IA. Revisa tu conexión.";
                errorMessage.classList.remove('hidden');
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                loadingIcon.classList.add('hidden');
                userInput.focus();
            }
        });

        clearChatBtn.addEventListener('click', () => {
            chatDisplay.innerHTML = '';
            addMessage('assistant', 'Chat reiniciado. ¿En qué más puedo ayudarte?');
        });

        window.onload = () => userInput.focus();
    </script>
</body>
</html>
