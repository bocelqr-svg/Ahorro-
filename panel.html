<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>R7 Colmado - Panel</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#ecf0f1;
}

header{
    background:#27ae60;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    display:flex;
    justify-content:center;
    margin-top:50px;
    gap:20px;
}

.card{
    background:white;
    width:200px;
    padding:20px;
    text-align:center;
    border-radius:10px;
    box-shadow:0px 0px 10px gray;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    background:#27ae60;
    color:white;
}
</style>
</head>

<body>

<header>
<h1>R7 Sistema de Colmado</h1>
<p>Panel Principal</p>
</header>

<div class="container">

<div class="card">
<h3>📦 Inventario</h3>
<p>Administrar productos</p>
<button onclick="ir('inventario.html')">Entrar</button>
</div>

<div class="card">
<h3>🧾 Ventas</h3>
<p>Registrar ventas</p>
<button onclick="ir('ventas.html')">Entrar</button>
</div>

<div class="card">
<h3>💰 Reportes</h3>
<p>Ver ganancias</p>
<button onclick="ir('reportes.html')">Entrar</button>
</div>

</div>

<script>
function ir(pagina){
    window.location = pagina;
}
</script>

</body>
</html>
